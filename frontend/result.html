<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kết quả Dự đoán | DiabetesAI</title>
    <meta name="description" content="Kết quả phân tích nguy cơ mắc bệnh tiểu đường"/>
    <link rel="stylesheet" href="css/style.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a href="index.html" class="nav-brand">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="url(#g2)"/>
                <path d="M12 6v6l4 2" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <defs><linearGradient id="g2" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#1e40af"/><stop offset="1" stop-color="#0369a1"/>
                </linearGradient></defs>
            </svg>
            DiabetesAI
        </a>
        <div class="nav-links">
            <a href="index.html">🩺 Dự đoán</a>
            <a href="history.html">📋 Lịch sử</a>
            <div id="auth-section" class="auth-buttons">
                <button class="btn btn-sm btn-outline" onclick="window.location.href='index.html?action=register'">Đăng ký</button>
                <button class="btn btn-sm btn-primary" onclick="window.location.href='index.html?action=login'">Đăng nhập</button>
            </div>
            <div id="user-section" class="user-profile hidden">
                <span id="user-name">Người dùng</span>
                <a href="#" id="admin-link" class="hidden">⚙️ Admin</a>
                <button class="btn btn-sm btn-outline" onclick="Auth.logout()">Đăng xuất</button>
            </div>
        </div>
    </div>
</nav>

<main class="container" style="padding: 40px 24px 60px;">
    <!-- Header -->
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:32px;" class="animate-in">
        <a href="index.html" class="btn btn-outline btn-sm">← Dự đoán mới</a>
        <h1 style="font-size:1.3rem; font-weight:700;">Kết quả phân tích</h1>
    </div>

    <div id="resultContent" class="result-grid">
        <!-- Injected by JS -->
    </div>

    <!-- Recommendation -->
    <div id="recCard" class="card animate-in delay-2" style="margin-top:24px; padding:24px 28px; display:none;">
        <div style="display:flex; align-items:flex-start; gap:14px;">
            <div style="font-size:1.6rem;">💊</div>
            <div>
                <div style="font-weight:600; margin-bottom:6px;">Khuyến nghị</div>
                <p id="recText" style="color:var(--text-secondary); font-size:0.9rem; line-height:1.7;"></p>
            </div>
        </div>
    </div>

    <!-- Save + feature chart -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:24px;" class="features-section">
        <div class="card animate-in delay-3" id="featureCard" style="display:none;">
            <div class="card-header">
                <div class="card-icon">📊</div>
                <h2>Tầm quan trọng đặc trưng</h2>
            </div>
            <div class="card-body">
                <div class="feature-bars" id="featureBars"></div>
            </div>
        </div>
        <div class="card animate-in delay-3" id="inputCard" style="display:none;">
            <div class="card-header">
                <div class="card-icon">📋</div>
                <h2>Chỉ số đã nhập</h2>
            </div>
            <div class="card-body">
                <div id="inputTable"></div>
            </div>
        </div>
    </div>

    <!-- Save button -->
    <div style="text-align:center; margin-top:32px;" class="animate-in delay-3">
        <button class="btn btn-primary btn-lg" id="saveBtn" style="min-width:220px;">
            💾 Lưu kết quả
        </button>
        <p style="color:var(--text-muted); font-size:0.78rem; margin-top:8px;">Kết quả sẽ được lưu vào lịch sử</p>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/result.js"></script>
</body>
</html>
