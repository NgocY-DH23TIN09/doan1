<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kết quả Dự đoán | DiabetesAI</title>
    <meta name="description" content="Kết quả phân tích nguy cơ mắc bệnh tiểu đường"/>
    <link rel="stylesheet" href="css/style.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a href="index.html" class="nav-brand">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="url(#g2)"/>
                <path d="M12 6v6l4 2" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <defs><linearGradient id="g2" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#1e40af"/><stop offset="1" stop-color="#0369a1"/>
                </linearGradient></defs>
            </svg>
            DiabetesAI
        </a>
        <button class="nav-toggle" type="button" aria-label="Mở menu điều hướng" aria-expanded="false" aria-controls="navLinks" onclick="toggleNav(this)">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="nav-links" id="navLinks">
            <a href="index.html" data-i18n="nav.predict">🩺 Dự đoán</a>
            <a href="history.html" data-i18n="nav.history">📋 Lịch sử</a>
            <a href="settings.html" data-i18n="nav.settings">⚙️ Cài đặt</a>
            <div id="auth-section" class="auth-buttons">
                <button class="btn btn-sm btn-outline" onclick="window.location.href='index.html?action=register'" data-i18n="auth.register">Đăng ký</button>
                <button class="btn btn-sm btn-primary" onclick="window.location.href='index.html?action=login'" data-i18n="auth.login">Đăng nhập</button>
            </div>
            <div id="user-section" class="user-profile hidden">
                <span id="user-name">Người dùng</span>
                <a href="#" id="admin-link" class="hidden">⚙️ Admin</a>
                <button class="btn btn-sm btn-outline" onclick="Auth.logout()" data-i18n="auth.logout">Đăng xuất</button>
            </div>
        </div>
    </div>
</nav>

<main class="container main-content result-main">
    <!-- Header -->
    <div class="result-header animate-in">
        <a href="index.html" class="btn btn-outline btn-sm" data-i18n="result.newPrediction">← Dự đoán mới</a>
        <h1 class="result-title" data-i18n="result.title">Kết quả phân tích</h1>
    </div>

    <div id="resultContent" class="result-grid">
        <!-- Injected by JS -->
    </div>

    <!-- Recommendation -->
    <div id="recCard" class="card animate-in delay-2 recommendation-card" style="display:none;">
        <div class="recommendation-layout">
            <div class="recommendation-icon">💊</div>
            <div>
                <div class="recommendation-title">Khuyến nghị</div>
                <p id="recText" class="recommendation-text"></p>
            </div>
        </div>
    </div>

    <!-- Save + feature chart -->
    <div class="features-section">
        <div class="card animate-in delay-3" id="featureCard" style="display:none;">
            <div class="card-header">
                <div class="card-icon">📊</div>
                <h2>Tầm quan trọng đặc trưng</h2>
            </div>
            <div class="card-body">
                <div class="feature-bars" id="featureBars"></div>
            </div>
        </div>
        <div class="card animate-in delay-3" id="inputCard" style="display:none;">
            <div class="card-header">
                <div class="card-icon">📋</div>
                <h2>Chỉ số đã nhập</h2>
            </div>
            <div class="card-body">
                <div id="inputTable"></div>
            </div>
        </div>
    </div>

    <!-- Save button -->
    <div class="save-actions animate-in delay-3">
        <button class="btn btn-primary btn-lg" id="saveBtn" style="min-width:220px;">
            💾 Lưu kết quả
        </button>
        <p class="save-hint">Kết quả sẽ được lưu vào lịch sử</p>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script src="js/result.js"></script>
</body>
</html>
